<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Discover our Instagram Post ID Extractor. Fast and free tool to extract data easily. Try it now!">
<meta name="keywords" content="Instagram Post ID, IG Postid, Instagram tool, Post ID extractor, Igpostid">

<title>Instagram Post ID Extractor</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:90%;
max-width:650px;
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.header{
text-align:center;
margin-bottom:20px;
}

.header img{
width:60px;
margin-bottom:10px;
}

h1{
margin:5px 0;
}

p{
color:#555;
}

textarea{
width:100%;
height:120px;
margin-top:15px;
padding:12px;
font-size:15px;
border-radius:8px;
border:1px solid #ddd;
resize:none;
}

textarea:focus{
outline:none;
border-color:#e1306c;
}

button{
margin-top:15px;
width:100%;
background:#e1306c;
color:white;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#c72c61;
transform:scale(1.02);
}

.output{
margin-top:25px;
}

.output h2{
margin-bottom:10px;
}

#copyAllBtn{
background:#333;
margin-bottom:10px;
display:none;
}

#copyAllBtn:hover{
background:black;
}

.output ul{
list-style:none;
padding:0;
}

.output li{
background:#f5f5f5;
padding:12px;
margin-bottom:8px;
border-radius:6px;
font-family:monospace;
}

.footer{
position:fixed;
bottom:8px;
width:100%;
text-align:center;
font-size:12px;
color:white;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
<h1>Instagram Post ID Extractor</h1>
<p>Paste one or more Instagram links (one per line)</p>
</div>

<textarea id="inputLinks" placeholder="https://www.instagram.com/p/..."></textarea>

<button onclick="extractPostIds()">Find Post ID</button>

<div class="output">

<h2>Results</h2>

<button id="copyAllBtn" onclick="copyAllIDs()">Copy IDs</button>

<ul id="resultList"></ul>

</div>

</div>

<div class="footer">
© 2025 Developed by Simone Moschetti
</div>

<script>

async function extractPostIds(){

const input = document.getElementById('inputLinks').value;
const links = input.split('\n').map(link => link.trim());
const resultList = document.getElementById('resultList');
const copyBtn = document.getElementById('copyAllBtn');

resultList.innerHTML='';
copyBtn.style.display="none";

for(const link of links){

if(link){

try{

const response = await fetch('https://instagram-postid-extractor-production.up.railway.app/',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({url:link}),
});

const data = await response.json();

const listItem=document.createElement('li');

if(response.ok){

listItem.textContent=data.postId;

}else{

listItem.textContent=`Check the link, it's wrong! ${link}: ${data.error}`;

}

resultList.appendChild(listItem);

}catch(error){

const listItem=document.createElement('li');
listItem.textContent=`Error: ${link}`;
resultList.appendChild(listItem);

}

}

}

if(resultList.children.length>0){
copyBtn.style.display="block";
}

}

function copyAllIDs(){

const ids=Array.from(document.querySelectorAll('#resultList li'))
.map(li=>li.textContent)
.join('\n');

navigator.clipboard.writeText(ids);

alert("IDs copied!");

}

</script>

</body>
</html>
